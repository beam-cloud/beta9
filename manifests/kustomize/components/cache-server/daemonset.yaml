apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beta9-cache-server
  namespace: beta9
  labels:
    app.kubernetes.io/name: beta9
    app.kubernetes.io/component: cache-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: beta9
      app.kubernetes.io/component: cache-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beta9
        app.kubernetes.io/component: cache-server
    spec:
      automountServiceAccountToken: true
      serviceAccountName: beta9-control-plane
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 60
      containers:
      - name: worker
        image: registry.localhost:5000/beta9-worker:latest
        imagePullPolicy: IfNotPresent
        command:
        - /usr/bin/tini
        - -g
        - --
        - /usr/local/bin/worker
        env:
        - name: CONFIG_PATH
          value: /etc/beta9/.config.yaml
        - name: CACHE_SERVER_ONLY
          value: "true"
        - name: WORKER_POOL_NAME
          value: default
        - name: CACHE_LOCALITY
          value: default
        - name: CACHE_NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: WORKER_ID
          value: cache-server-$(CACHE_NODE_ID)
        - name: CACHE_HOST_NETWORK
          value: "true"
        volumeMounts:
        - mountPath: /etc/beta9/.config.yaml
          name: config
          subPath: .config.yaml
          readOnly: true
        - mountPath: /var/lib/beta9/cache
          name: cache
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "2"
            memory: 2Gi
      volumes:
      - name: config
        secret:
          secretName: beta9-config
      - name: cache
        hostPath:
          path: /var/lib/beta9/cache
          type: DirectoryOrCreate
