name: Build and release Custom Gateway Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'image tag'
        required: true
        type: string
      byoc_template_bucket:
        description: 'Optional S3 bucket for publishing the AWS BYOC template'
        required: false
        type: string
      byoc_template_alias:
        description: 'Optional AWS BYOC template alias, for example byoc-template.yaml'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build_and_release_gateway:
    environment: Release
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_GITHUB }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr
        with:
          registry-type: public
          mask-password: 'true'

      - name: Build and push container image to Amazon ECR
        uses: docker/build-push-action@v5
        with:
          file: ./docker/Dockerfile.gateway
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/n4e0e1y0/beta9-gateway:${{ inputs.tag }}-${{ matrix.arch }}
          target: release
          platforms: ${{ matrix.platform }}

  publish_gateway_manifest:
    needs: build_and_release_gateway
    environment: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_GITHUB }}
          aws-region: us-east-1

      - name: Publish AWS BYOC template
        if: inputs.byoc_template_bucket != ''
        env:
          BYOC_TEMPLATE_BUCKET: ${{ inputs.byoc_template_bucket }}
          BYOC_TEMPLATE_ALIAS: ${{ inputs.byoc_template_alias }}
          BYOC_TEMPLATE_VERSION: ${{ inputs.tag }}
        run: |
          args=("$BYOC_TEMPLATE_BUCKET" "$BYOC_TEMPLATE_VERSION")
          if [[ -n "$BYOC_TEMPLATE_ALIAS" ]]; then
            args+=("$BYOC_TEMPLATE_ALIAS")
          fi
          hack/publish_byoc_template.sh "${args[@]}"

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr
        with:
          registry-type: public
          mask-password: 'true'

      - name: Publish multi-platform image manifest
        env:
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/n4e0e1y0/beta9-gateway
          TAG_NAME: ${{ inputs.tag }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG_NAME}" \
            "${IMAGE}:${TAG_NAME}-amd64" \
            "${IMAGE}:${TAG_NAME}-arm64"
