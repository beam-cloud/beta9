syntax = "proto3";

option go_package = "github.com/beam-cloud/beta9/proto";
import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "types.proto";

package gateway;

service GatewayService {
  // Auth
  rpc Authorize(AuthorizeRequest) returns (AuthorizeResponse) {
    option (google.api.http) = {
      post : "/auth/authorize"
    };
  }
  rpc SignPayload(SignPayloadRequest) returns (SignPayloadResponse) {
    option (google.api.http) = {
      post : "/auth/sign"
      body : "*"
    };
  }

  // Objects
  rpc HeadObject(HeadObjectRequest) returns (HeadObjectResponse) {
    option (google.api.http) = {
      get : "/objects/{hash}"
    };
  }
  rpc CreateObject(CreateObjectRequest) returns (CreateObjectResponse) {
    option (google.api.http) = {
      post : "/objects"
      body : "*"
    };
  }
  rpc PutObjectStream(stream PutObjectRequest) returns (PutObjectResponse) {}

  // Containers
  rpc CheckpointContainer(CheckpointContainerRequest)
      returns (CheckpointContainerResponse) {}

  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse) {
    option (google.api.http) = {
      get : "/containers"
    };
  }
  rpc StopContainer(StopContainerRequest) returns (StopContainerResponse) {
    option (google.api.http) = {
      post : "/containers/{container_id}/stop"
    };
  }
  rpc AttachToContainer(stream ContainerStreamMessage)
      returns (stream AttachToContainerResponse) {}

  // Tasks
  rpc StartTask(StartTaskRequest) returns (StartTaskResponse) {
    option (google.api.http) = {
      post : "/tasks/start"
      body : "*"
    };
  }
  rpc EndTask(EndTaskRequest) returns (EndTaskResponse) {
    option (google.api.http) = {
      post : "/tasks/end"
      body : "*"
    };
  }
  rpc StopTasks(StopTasksRequest) returns (StopTasksResponse) {
    option (google.api.http) = {
      post : "/tasks/stop"
      body : "*"
    };
  }
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {
    option (google.api.http) = {
      get : "/tasks"
    };
  }

  // Stubs
  rpc GetOrCreateStub(GetOrCreateStubRequest)
      returns (GetOrCreateStubResponse) {
    option (google.api.http) = {
      post : "/stubs"
      body : "*"
    };
  }
  rpc DeployStub(DeployStubRequest) returns (DeployStubResponse) {
    option (google.api.http) = {
      post : "/stubs/deploy"
      body : "*"
    };
  }
  rpc GetURL(GetURLRequest) returns (GetURLResponse) {
    option (google.api.http) = {
      get : "/stubs/{stub_id}/url"
    };
  }

  // Deployments
  rpc ListDeployments(ListDeploymentsRequest)
      returns (ListDeploymentsResponse) {
    option (google.api.http) = {
      get : "/deployments"
    };
  }
  rpc StopDeployment(StopDeploymentRequest) returns (StopDeploymentResponse) {
    option (google.api.http) = {
      post : "/deployments/{id}/stop"
    };
  }
  rpc StartDeployment(StartDeploymentRequest)
      returns (StartDeploymentResponse) {
    option (google.api.http) = {
      post : "/deployments/{id}/start"
    };
  }
  rpc ScaleDeployment(ScaleDeploymentRequest)
      returns (ScaleDeploymentResponse) {
    option (google.api.http) = {
      post : "/deployments/{id}/scale"
      body : "*"
    };
  }
  rpc DeleteDeployment(DeleteDeploymentRequest)
      returns (DeleteDeploymentResponse) {
    option (google.api.http) = {
      delete : "/deployments/{id}"
    };
  }

  // Pools
  rpc ListPools(ListPoolsRequest) returns (ListPoolsResponse) {
    option (google.api.http) = {
      get : "/pools"
    };
  }

  // Private compute pools
  rpc ListPoolOffers(ListPoolOffersRequest)
      returns (ListPoolOffersResponse) {
    option (google.api.http) = {
      post : "/pools:offers"
      body : "*"
    };
  }
  rpc LaunchPoolCapacity(LaunchPoolCapacityRequest)
      returns (LaunchPoolCapacityResponse) {
    option (google.api.http) = {
      post : "/pools:launch"
      body : "*"
    };
  }
  rpc ListPrivatePools(ListPrivatePoolsRequest) returns (ListPrivatePoolsResponse) {
    option (google.api.http) = {
      get : "/pools/private"
    };
  }
  rpc CreatePool(CreatePoolRequest)
      returns (CreatePoolResponse) {
    option (google.api.http) = {
      post : "/pools"
      body : "*"
    };
  }
  rpc DeletePool(DeletePoolRequest)
      returns (DeletePoolResponse) {
    option (google.api.http) = {
      delete : "/pools/{name}"
    };
  }
  rpc ExtendPoolCapacity(ExtendPoolCapacityRequest)
      returns (ExtendPoolCapacityResponse) {
    option (google.api.http) = {
      post : "/pools/{name}/extend"
      body : "*"
    };
  }
  rpc CreatePoolJoinToken(CreatePoolJoinTokenRequest)
      returns (CreatePoolJoinTokenResponse) {
    option (google.api.http) = {
      post : "/pools/{pool_name}/join-tokens"
      body : "*"
    };
  }
  rpc RevokePoolJoinToken(RevokePoolJoinTokenRequest)
      returns (RevokePoolJoinTokenResponse) {
    option (google.api.http) = {
      post : "/pools/join-tokens/revoke"
      body : "*"
    };
  }
  rpc GetPoolJoinCommand(GetPoolJoinCommandRequest)
      returns (GetPoolJoinCommandResponse) {
    option (google.api.http) = {
      post : "/pools/{pool_name}/join-command"
      body : "*"
    };
  }
  rpc ListPoolMachines(ListPoolMachinesRequest)
      returns (ListPoolMachinesResponse) {
    option (google.api.http) = {
      get : "/pools/{pool_name}/machines"
    };
  }
  rpc JoinAgent(JoinAgentRequest) returns (JoinAgentResponse) {
    option (google.api.http) = {
      post : "/agent/join"
      body : "*"
    };
  }
  rpc RequestAgentTransportCredential(RequestAgentTransportCredentialRequest)
      returns (RequestAgentTransportCredentialResponse) {
    option (google.api.http) = {
      post : "/agent/transport-credential"
      body : "*"
    };
  }
  rpc ListAgentRoutes(ListAgentRoutesRequest)
      returns (ListAgentRoutesResponse) {
    option (google.api.http) = {
      post : "/agent/routes:list"
      body : "*"
    };
  }
  rpc UpdateAgentRouteStatus(UpdateAgentRouteStatusRequest)
      returns (UpdateAgentRouteStatusResponse) {
    option (google.api.http) = {
      post : "/agent/routes/status"
      body : "*"
    };
  }
  rpc StreamAgent(StreamAgentRequest) returns (stream StreamAgentResponse);
  rpc StreamAgentTelemetry(stream AgentTelemetryRequest)
      returns (AgentTelemetryResponse);

  // Machines
  rpc ListMachines(ListMachinesRequest) returns (ListMachinesResponse) {
    option (google.api.http) = {
      get : "/machines"
    };
  }
  rpc CreateMachine(CreateMachineRequest) returns (CreateMachineResponse) {
    option (google.api.http) = {
      post : "/machines"
      body : "*"
    };
  }
  rpc DeleteMachine(DeleteMachineRequest) returns (DeleteMachineResponse) {
    option (google.api.http) = {
      delete : "/machines/{machine_id}"
    };
  }

  // Tokens
  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse) {
    option (google.api.http) = {
      get : "/tokens"
    };
  }
  rpc CreateToken(CreateTokenRequest) returns (CreateTokenResponse) {
    option (google.api.http) = {
      post : "/tokens"
    };
  }
  rpc ToggleToken(ToggleTokenRequest) returns (ToggleTokenResponse) {
    option (google.api.http) = {
      post : "/tokens/{token_id}/toggle"
    };
  }
  rpc DeleteToken(DeleteTokenRequest) returns (DeleteTokenResponse) {
    option (google.api.http) = {
      delete : "/tokens/{token_id}"
    };
  }

  // Workers
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse) {
    option (google.api.http) = {
      get : "/workers"
    };
  }
  rpc CordonWorker(CordonWorkerRequest) returns (CordonWorkerResponse) {
    option (google.api.http) = {
      post : "/workers/{worker_id}/cordon"
    };
  }
  rpc UncordonWorker(UncordonWorkerRequest) returns (UncordonWorkerResponse) {
    option (google.api.http) = {
      post : "/workers/{worker_id}/uncordon"
    };
  }
  rpc DrainWorker(DrainWorkerRequest) returns (DrainWorkerResponse) {
    option (google.api.http) = {
      post : "/workers/{worker_id}/drain"
    };
  }

  // Workspace
  rpc ExportWorkspaceConfig(ExportWorkspaceConfigRequest)
      returns (ExportWorkspaceConfigResponse) {
    option (google.api.http) = {
      get : "/workspace/config"
    };
  }
}

message AuthorizeRequest {}

message AuthorizeResponse {
  bool ok = 1;
  string workspace_id = 2;
  string new_token = 3;
  string error_msg = 4;
}

message SignPayloadRequest { bytes payload = 1; }

message SignPayloadResponse {
  bool ok = 1;
  string signature = 2;
  int64 timestamp = 3;
  string error_msg = 4;
}

message ObjectMetadata {
  string name = 1;
  int64 size = 2;
}

message HeadObjectRequest {
  string hash = 1;
  bool supports_put_headers = 2;
}

message HeadObjectResponse {
  bool ok = 1;
  bool exists = 2;
  string object_id = 3;
  ObjectMetadata object_metadata = 4;
  string error_msg = 5;
  bool use_workspace_storage = 6;
}

message CreateObjectRequest {
  ObjectMetadata object_metadata = 1;
  string hash = 2;
  int64 size = 3;
  bool overwrite = 4;
  bool supports_put_headers = 5;
}

message CreateObjectResponse {
  bool ok = 1;
  string object_id = 2;
  string presigned_url = 3;
  string error_msg = 4;
  map<string, string> put_headers = 5;
}

message PutObjectRequest {
  bytes object_content = 1;
  ObjectMetadata object_metadata = 2;
  string hash = 3;
  bool overwrite = 4;
}

message PutObjectResponse {
  bool ok = 1;
  string object_id = 2;
  string error_msg = 3;
}

enum SyncContainerWorkspaceOperation {
  WRITE = 0;
  DELETE = 1;
  MOVED = 2;
}

message SyncContainerWorkspaceRequest {
  string container_id = 1;
  string path = 2;
  string new_path = 3;
  bool is_dir = 4;
  bytes data = 5;
  SyncContainerWorkspaceOperation op = 6;
}

message SyncContainerWorkspaceResponse { bool ok = 1; }

// Container messages

message ListContainersRequest {}

message ListContainersResponse {
  repeated types.Container containers = 1;
  bool ok = 2;
  string error_msg = 3;
}

message StopContainerRequest { string container_id = 1; }

message StopContainerResponse {
  bool ok = 1;
  string error_msg = 2;
}

message CheckpointContainerRequest { string container_id = 1; }

message CheckpointContainerResponse {
  bool ok = 1;
  string checkpoint_id = 2;
  string error_msg = 3;
}

message ContainerStreamMessage {
  oneof payload {
    AttachToContainerRequest attach_request = 1;
    SyncContainerWorkspaceRequest sync_container_workspace = 2;
  }
}

message AttachToContainerRequest { string container_id = 1; }

message AttachToContainerResponse {
  string output = 1;
  bool done = 2;
  int32 exit_code = 3;
}

// Task messages
message StartTaskRequest {
  string task_id = 1;
  string container_id = 2;
}

message StartTaskResponse { bool ok = 1; }

message EndTaskRequest {
  string task_id = 1;
  float task_duration = 2;
  string task_status = 3;
  string container_id = 4;
  string container_hostname = 5;
  float keep_warm_seconds = 6;
  bytes result = 7;
}

message EndTaskResponse { bool ok = 1; }

message StringList { repeated string values = 1; }

message ListTasksRequest {
  map<string, StringList> filters = 1;
  uint32 limit = 2;
}

message Task {
  string id = 2;
  string status = 3;
  string container_id = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp ended_at = 6;
  string stub_id = 7;
  string stub_name = 8;
  string workspace_id = 9;
  string workspace_name = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message ListTasksResponse {
  bool ok = 1;
  string err_msg = 2;
  repeated Task tasks = 3;
  int32 total = 4;
}

message StopTasksRequest { repeated string task_ids = 1; }

message StopTasksResponse {
  bool ok = 1;
  string err_msg = 2;
}

message Volume {
  string id = 1;
  string mount_path = 2;
  optional types.MountPointConfig config = 3;
}

message SecretVar { string name = 1; }

message Autoscaler {
  string type = 1;
  uint32 max_containers = 2;
  uint32 tasks_per_container = 3;
  uint32 min_containers = 4;
}

message TaskPolicy {
  int64 timeout = 1;
  uint32 max_retries = 2;
  uint32 ttl = 3;
}

message Schema { map<string, SchemaField> fields = 1; }

message SchemaField {
  string type = 1;
  Schema fields = 2;
}

message GetOrCreateStubRequest {
  string object_id = 1;
  string image_id = 2;
  string stub_type = 3;
  string name = 4;
  string python_version = 5;
  int64 cpu = 6;
  int64 memory = 7;
  string gpu = 8;
  string handler = 9;
  uint32 retries = 10;
  int64 timeout = 11;
  float keep_warm_seconds = 12;
  uint32 workers = 13;
  uint32 max_pending_tasks = 15;
  repeated Volume volumes = 16;
  bool force_create = 17;
  string on_start = 18;
  string callback_url = 19;
  bool authorized = 20;
  repeated SecretVar secrets = 21;
  Autoscaler autoscaler = 22;
  TaskPolicy task_policy = 23;
  uint32 concurrent_requests = 24;
  string extra = 25;
  bool checkpoint_enabled = 26;
  uint32 gpu_count = 27;
  string on_deploy = 28;
  string on_deploy_stub_id = 29;
  repeated string entrypoint = 30;
  repeated uint32 ports = 31;
  repeated string env = 32;
  string app_name = 33;
  types.PricingPolicy pricing = 34;
  Schema inputs = 35;
  Schema outputs = 36;
  bool tcp = 37;
  bool block_network = 38;
  repeated string allow_list = 39;
  bool docker_enabled = 40;
  PoolConfig pool = 41;
}

message GetOrCreateStubResponse {
  bool ok = 1;
  string stub_id = 2;
  string err_msg = 3;
  string warn_msg = 4;
}

message DeployStubRequest {
  string stub_id = 1;
  string name = 2;
}

message DeployStubResponse {
  bool ok = 1;
  string deployment_id = 2;
  uint32 version = 3;
  string invoke_url = 4;
}

message Deployment {
  string id = 1;
  string name = 2;
  bool active = 3;
  string stub_id = 4;
  string stub_type = 5;
  string stub_name = 6;
  uint32 version = 7;
  string workspace_id = 8;
  string workspace_name = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  string app_id = 12;
}

message ListDeploymentsRequest {
  map<string, StringList> filters = 1;
  uint32 limit = 2;
}

message ListDeploymentsResponse {
  bool ok = 1;
  string err_msg = 2;
  repeated Deployment deployments = 3;
}

message StopDeploymentRequest { string id = 1; }

message StopDeploymentResponse {
  bool ok = 1;
  string err_msg = 2;
}

message StartDeploymentRequest { string id = 1; }

message StartDeploymentResponse {
  bool ok = 1;
  string err_msg = 2;
}

message ScaleDeploymentRequest {
  string id = 1;
  uint32 containers = 2;
}

message ScaleDeploymentResponse {
  bool ok = 1;
  string err_msg = 2;
}

message DeleteDeploymentRequest { string id = 1; }

message DeleteDeploymentResponse {
  bool ok = 1;
  string err_msg = 2;
}

message Pool {
  string name = 2;
  bool active = 3;
  string gpu = 4;
  string minFreeGpu = 5;
  string minFreeCpu = 6;
  string minFreeMemory = 7;
  string defaultWorkerCpu = 8;
  string defaultWorkerMemory = 9;
  string defaultWorkerGpuCount = 10;
  types.WorkerPoolState state = 11;
}

message ListPoolsRequest {
  map<string, StringList> filters = 1;
  uint32 limit = 2;
}

message ListPoolsResponse {
  bool ok = 1;
  string err_msg = 2;
  repeated Pool pools = 3;
}

message PoolConfig {
  string name = 1;
  repeated string gpu = 2;
  uint32 gpus = 3;
  string ttl = 4;
  double max_spend = 5;
  repeated string providers = 6;
  repeated string regions = 7;
  double min_reliability = 8;
  string selector = 9;
  string mode = 10;
  string transport = 11;
  string fallback = 12;
  int32 priority = 13;
  string offer_id = 14;
}

message PoolOffer {
  string id = 1;
  string provider = 2;
  string instance_type = 3;
  string region = 4;
  string gpu = 5;
  uint32 gpu_count = 6;
  int64 cpu_millicores = 7;
  int64 memory_mb = 8;
  int64 hourly_cost_micros = 9;
  double reliability = 10;
  uint32 available = 11;
  int64 storage_mb = 12;
  string cloud = 13;
}

message ProviderInstance {
  string id = 1;
  string pool_name = 2;
  string provider = 3;
  string offer_id = 4;
  string status = 5;
  uint32 gpu_count = 6;
  int64 hourly_cost_micros = 7;
  string source = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp expires_at = 10;
  google.protobuf.Timestamp billing_renewal_at = 11;
  string status_message = 12;
  string terminating_reason = 13;
  string machine_id = 14;
}

message PrivatePool {
  string name = 1;
  string selector = 2;
  PoolConfig config = 3;
  repeated ProviderInstance reservations = 4;
  uint32 reserved_gpus = 5;
  int64 committed_spend_micros = 6;
  string status = 7;
  string source = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp expires_at = 10;
  uint32 machine_count = 11;
  uint32 ready_machine_count = 12;
}

message ListPoolOffersRequest { PoolConfig pool = 1; }

message ListPoolOffersResponse {
  bool ok = 1;
  string err_msg = 2;
  repeated PoolOffer offers = 3;
}

message LaunchPoolCapacityRequest { PoolConfig pool = 1; }

message LaunchPoolCapacityResponse {
  bool ok = 1;
  string err_msg = 2;
  PrivatePool pool = 3;
  string error_code = 4;
  int64 required_cents = 5;
  int64 available_cents = 6;
}

message ListPrivatePoolsRequest {
  map<string, StringList> filters = 1;
  uint32 limit = 2;
}

message ListPrivatePoolsResponse {
  bool ok = 1;
  string err_msg = 2;
  repeated PrivatePool pools = 3;
}

message CreatePoolRequest { PoolConfig pool = 1; }

message CreatePoolResponse {
  bool ok = 1;
  string err_msg = 2;
  PrivatePool pool = 3;
}

message DeletePoolRequest { string name = 1; }

message DeletePoolResponse {
  bool ok = 1;
  string err_msg = 2;
}

message ExtendPoolCapacityRequest {
  string name = 1;
  string ttl = 2;
  double max_spend = 3;
}

message ExtendPoolCapacityResponse {
  bool ok = 1;
  string err_msg = 2;
  PrivatePool pool = 3;
}

message CreatePoolJoinTokenRequest {
  string pool_name = 1;
  string ttl = 2;
}

message CreatePoolJoinTokenResponse {
  bool ok = 1;
  string err_msg = 2;
  string token = 3;
  google.protobuf.Timestamp expires_at = 4;
}

message RevokePoolJoinTokenRequest { string token = 1; }

message RevokePoolJoinTokenResponse {
  bool ok = 1;
  string err_msg = 2;
}

message GetPoolJoinCommandRequest {
  string pool_name = 1;
  string ttl = 2;
}

message GetPoolJoinCommandResponse {
  bool ok = 1;
  string err_msg = 2;
  string command = 3;
  string token = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message ListPoolMachinesRequest {
  string pool_name = 1;
  uint32 limit = 2;
}

message ListPoolMachinesResponse {
  bool ok = 1;
  string err_msg = 2;
  repeated Machine machines = 3;
}

message AgentBootstrapConfig {
  string gateway_http_url = 1;
  string gateway_grpc_host = 2;
  int32 gateway_grpc_port = 3;
  bool gateway_grpc_tls = 4;
  string workspace_id = 5;
  string pool_name = 6;
  string transport = 7;
  string executor = 8;
  string fallback = 9;
  repeated string disabled_services = 10;
  string image_registry_store = 11;
  uint32 image_clip_version = 12;
  bool image_local_cache_enabled = 13;
  AgentTelemetryConfig telemetry = 14;
}

message AgentTelemetryConfig {
  bool enabled = 1;
  string stream_prefix = 2;
  AgentTelemetrySinkConfig logs = 3;
  AgentTelemetrySinkConfig events = 4;
}

message AgentTelemetrySinkConfig {
  string destination = 1;
  string credential = 2;
  string stream_prefix = 3;
}

message JoinAgentRequest {
  string join_token = 1;
  string machine_fingerprint = 2;
  string hostname = 3;
  string os = 4;
  string arch = 5;
  uint32 cpu_count = 6;
  uint64 memory_mb = 7;
  repeated string gpu = 8;
  uint32 gpu_count = 9;
  repeated AgentPreflightCheck preflight = 10;
  bool schedulable = 11;
  string executor = 12;
  int64 cpu_millicores = 13;
  repeated string gpu_ids = 14;
  uint32 network_slot_pool_size = 15;
  uint32 container_start_concurrency = 16;
}

message JoinAgentResponse {
  bool ok = 1;
  string err_msg = 2;
  string workspace_id = 3;
  string pool_name = 4;
  string machine_id = 5;
  string agent_token = 6;
  AgentBootstrapConfig bootstrap = 7;
}

message AgentPreflightCheck {
  string name = 1;
  bool ok = 2;
  string message = 3;
  string severity = 4;
}

message AgentRoute {
  string route_id = 1;
  string workspace_id = 2;
  string pool_name = 3;
  string machine_id = 4;
  string worker_id = 5;
  string container_id = 6;
  string kind = 7;
  int32 port = 8;
  string protocol = 9;
  string transport = 10;
  string local_target = 11;
  string proxy_target = 12;
  string state = 13;
  string error = 14;
  int64 updated_at = 15;
}

message RequestAgentTransportCredentialRequest {
  string agent_token = 1;
  string transport = 2;
}

message RequestAgentTransportCredentialResponse {
  bool ok = 1;
  string err_msg = 2;
  string auth_key = 3;
  string control_url = 4;
  string hostname = 5;
  bool ephemeral = 6;
}

message ListAgentRoutesRequest { string agent_token = 1; }

message ListAgentRoutesResponse {
  bool ok = 1;
  string err_msg = 2;
  repeated AgentRoute routes = 3;
}

message UpdateAgentRouteStatusRequest {
  string agent_token = 1;
  string route_id = 2;
  string state = 3;
  string proxy_target = 4;
  string error = 5;
  map<string, string> attrs = 6;
}

message UpdateAgentRouteStatusResponse {
  bool ok = 1;
  string err_msg = 2;
}

message AgentWorkerSlot {
  string worker_id = 1;
  string worker_token = 2;
  string pool_name = 3;
  string machine_id = 4;
  int64 cpu = 5;
  int64 memory = 6;
  string gpu = 7;
  uint32 gpu_count = 8;
  string gpu_assignment = 9;
  string network_prefix = 10;
  string worker_image = 11;
  uint32 network_slot_pool_size = 12;
  uint32 container_start_concurrency = 13;
}

message StreamAgentRequest { string agent_token = 1; }

message StreamAgentResponse {
  bool ok = 1;
  string err_msg = 2;
  repeated AgentRoute routes = 3;
  repeated AgentWorkerSlot slots = 4;
}

message AgentLogRecord {
  string source = 1;
  string worker_id = 2;
  string level = 3;
  string stream = 4;
  string line = 5;
  int64 timestamp_unix_nano = 6;
}

message AgentMetricSnapshot {
  int64 timestamp_unix_nano = 1;
  float cpu_utilization_pct = 2;
  uint64 memory_used_mb = 3;
  uint64 memory_total_mb = 4;
  float memory_utilization_pct = 5;
  uint64 disk_used_mb = 6;
  uint64 disk_total_mb = 7;
  float disk_usage_pct = 8;
  string disk_path = 9;
  uint32 worker_count = 10;
  uint32 container_count = 11;
  uint32 free_gpu_count = 12;
}

message AgentEventRecord {
  string action = 1;
  string status = 2;
  string message = 3;
  map<string, string> attrs = 4;
  int64 timestamp_unix_nano = 5;
  string event_type = 6;
}

