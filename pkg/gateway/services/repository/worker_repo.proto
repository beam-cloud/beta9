syntax = "proto3";

option go_package = "github.com/beam-cloud/beta9/proto";
import "types.proto";

service WorkerRepositoryService {
  rpc GetNextContainerRequest(GetNextContainerRequestRequest)
      returns (stream GetNextContainerRequestResponse) {}
  rpc StreamWorkerEvents(StreamWorkerEventsRequest)
      returns (stream WorkerEvent) {}
  rpc SetImagePullLock(SetImagePullLockRequest)
      returns (SetImagePullLockResponse) {}
  rpc RemoveImagePullLock(RemoveImagePullLockRequest)
      returns (RemoveImagePullLockResponse) {}
  rpc AddContainerToWorker(AddContainerToWorkerRequest)
      returns (AddContainerToWorkerResponse) {}
  rpc RemoveContainerFromWorker(RemoveContainerFromWorkerRequest)
      returns (RemoveContainerFromWorkerResponse) {}
  rpc GetWorkerById(GetWorkerByIdRequest) returns (GetWorkerByIdResponse) {}
  rpc ToggleWorkerAvailable(ToggleWorkerAvailableRequest)
      returns (ToggleWorkerAvailableResponse) {}
  rpc DisableWorker(DisableWorkerRequest) returns (DisableWorkerResponse) {}
  rpc RemoveWorker(RemoveWorkerRequest) returns (RemoveWorkerResponse) {}
  rpc UpdateWorkerCapacity(UpdateWorkerCapacityRequest)
      returns (UpdateWorkerCapacityResponse) {}
  rpc SetWorkerKeepAlive(SetWorkerKeepAliveRequest)
      returns (SetWorkerKeepAliveResponse) {}
  rpc RegisterCacheHost(RegisterCacheHostRequest)
      returns (RegisterCacheHostResponse) {}
  rpc UnregisterCacheHost(UnregisterCacheHostRequest)
      returns (UnregisterCacheHostResponse) {}
  rpc ListCacheHosts(ListCacheHostsRequest) returns (ListCacheHostsResponse) {}
  rpc ReportRequiredContent(ReportRequiredContentRequest)
      returns (ReportRequiredContentResponse) {}
  rpc ListRecentRequiredContentStubs(ListRecentRequiredContentStubsRequest)
      returns (ListRecentRequiredContentStubsResponse) {}
  rpc ListRequiredContentForStub(ListRequiredContentForStubRequest)
      returns (ListRequiredContentForStubResponse) {}
  rpc SetRequiredContentReconciliationStatus(
      SetRequiredContentReconciliationStatusRequest)
      returns (SetRequiredContentReconciliationStatusResponse) {}
  rpc ResolveRequiredContentOrigin(ResolveRequiredContentOriginRequest)
      returns (ResolveRequiredContentOriginResponse) {}
  rpc SetCacheClientLock(SetCacheClientLockRequest)
      returns (SetCacheClientLockResponse) {}
  rpc RemoveCacheClientLock(RemoveCacheClientLockRequest)
      returns (RemoveCacheClientLockResponse) {}
  rpc SetCacheStoreFromContentLock(SetCacheStoreFromContentLockRequest)
      returns (SetCacheStoreFromContentLockResponse) {}
  rpc RemoveCacheStoreFromContentLock(RemoveCacheStoreFromContentLockRequest)
      returns (RemoveCacheStoreFromContentLockResponse) {}
  rpc RefreshCacheStoreFromContentLock(RefreshCacheStoreFromContentLockRequest)
      returns (RefreshCacheStoreFromContentLockResponse) {}
  rpc SetCacheFsNode(SetCacheFsNodeRequest) returns (SetCacheFsNodeResponse) {}
  rpc GetCacheFsNode(GetCacheFsNodeRequest) returns (GetCacheFsNodeResponse) {}
  rpc AddCacheFsNodeChild(AddCacheFsNodeChildRequest)
      returns (AddCacheFsNodeChildResponse) {}
  rpc RemoveCacheFsNode(RemoveCacheFsNodeRequest)
      returns (RemoveCacheFsNodeResponse) {}
  rpc RemoveCacheFsNodeChild(RemoveCacheFsNodeChildRequest)
      returns (RemoveCacheFsNodeChildResponse) {}
  rpc GetCacheFsNodeChildren(GetCacheFsNodeChildrenRequest)
      returns (GetCacheFsNodeChildrenResponse) {}
  rpc SetNetworkLock(SetNetworkLockRequest) returns (SetNetworkLockResponse) {}
  rpc RemoveNetworkLock(RemoveNetworkLockRequest)
      returns (RemoveNetworkLockResponse) {}
  rpc SetContainerIp(SetContainerIpRequest) returns (SetContainerIpResponse) {}
  rpc MoveContainerIp(MoveContainerIpRequest)
      returns (MoveContainerIpResponse) {}
  rpc GetContainerIp(GetContainerIpRequest) returns (GetContainerIpResponse) {}
  rpc GetContainerIps(GetContainerIpsRequest)
      returns (GetContainerIpsResponse) {}
  rpc GetContainerIpAssignments(GetContainerIpAssignmentsRequest)
      returns (GetContainerIpAssignmentsResponse) {}
  rpc RemoveContainerIp(RemoveContainerIpRequest)
      returns (RemoveContainerIpResponse) {}
}

message GetNextContainerRequestRequest { string worker_id = 1; }

message GetNextContainerRequestResponse {
  bool ok = 1;
  types.ContainerRequest container_request = 2;
  string error_msg = 3;
}

message StreamWorkerEventsRequest { string worker_id = 1; }

message WorkerEvent {
  string event_id = 1;

  oneof event {
    StopContainerEvent stop_container = 2;
    StopBuildEvent stop_build = 3;
  }
}

message StopContainerEvent {
  string container_id = 1;
  bool force = 2;
  string reason = 3;
}

message StopBuildEvent { string container_id = 1; }

message SetImagePullLockRequest {
  string worker_id = 1;
  string image_id = 2;
}

message SetImagePullLockResponse {
  bool ok = 1;
  string token = 2;
  string error_msg = 3;
}

message RemoveImagePullLockRequest {
  string worker_id = 1;
  string image_id = 2;
  string token = 3;
}

message RemoveImagePullLockResponse {
  bool ok = 1;
  string error_msg = 2;
}

message AddContainerToWorkerRequest {
  string worker_id = 1;
  string container_id = 2;
  string pool_name = 3;
  string pod_hostname = 4;
}

message AddContainerToWorkerResponse {
  bool ok = 1;
  string error_msg = 2;
}

message RemoveContainerFromWorkerRequest {
  string worker_id = 1;
  string container_id = 2;
  string pool_name = 3;
  string pod_hostname = 4;  
}

message RemoveContainerFromWorkerResponse {
  bool ok = 1;
  string error_msg = 2;
}

message GetWorkerByIdRequest { string worker_id = 1; }

message GetWorkerByIdResponse {
  bool ok = 1;
  types.Worker worker = 2;
  string error_msg = 3;
}

message ToggleWorkerAvailableRequest { string worker_id = 1; }

message ToggleWorkerAvailableResponse {
  bool ok = 1;
  string error_msg = 2;
}

message DisableWorkerRequest { string worker_id = 1; }

message DisableWorkerResponse {
  bool ok = 1;
  string error_msg = 2;
}

message RemoveWorkerRequest { string worker_id = 1; }

message RemoveWorkerResponse {
  bool ok = 1;
  string error_msg = 2;
}

message UpdateWorkerCapacityRequest {
  string worker_id = 1;
  int64 capacity_change = 2;
  types.ContainerRequest container_request = 3;
}

message UpdateWorkerCapacityResponse {
  bool ok = 1;
  string error_msg = 2;
}

message SetWorkerKeepAliveRequest { string worker_id = 1; }

message SetWorkerKeepAliveResponse {
  bool ok = 1;
  string error_msg = 2;
}

message CacheCoordinatorHost {
  reserved 7;

  string logical_host_id = 1;
  string registration_id = 2;
  string pool_name = 3;
  string locality = 4;
  string node_id = 5;
  string cache_path_id = 6;
  string addr = 8;
  string private_addr = 9;
  float capacity_usage_pct = 10;
}

message RegisterCacheHostRequest {
  CacheCoordinatorHost host = 1;
  int32 ttl_seconds = 2;
}

message RegisterCacheHostResponse {
  bool ok = 1;
  string error_msg = 2;
}

message UnregisterCacheHostRequest {
  string logical_host_id = 1;
  string registration_id = 2;
  string pool_name = 3;
  string locality = 4;
}

message UnregisterCacheHostResponse {
  bool ok = 1;
  string error_msg = 2;
}

message ListCacheHostsRequest {
  string pool_name = 1;
  string locality = 2;
}

message ListCacheHostsResponse {
  bool ok = 1;
  repeated CacheCoordinatorHost hosts = 2;
  string error_msg = 3;
}

message RequiredContentSource {
  string type = 1;
  string descriptor = 2;
  string registry = 3;
  string repository = 4;
  string reference = 5;
  string layer_digest = 6;
  string bucket_name = 7;
  string region = 8;
  string endpoint_url = 9;
  string object_path = 10;
  bool force_path_style = 11;
}

message RequiredContentItem {
  string locality = 1;
  string workspace_id = 2;
  string stub_id = 3;
  string kind = 4;
  string hash = 5;
  string routing_key = 6;
  int64 size_bytes = 7;
  string expected_hash = 8;
  RequiredContentSource source = 9;
  int64 first_seen_unix_ms = 10;
  int64 last_seen_unix_ms = 11;
  int64 access_count = 12;
  string status = 13;
  int64 last_status_unix_ms = 14;
  string last_error = 15;
}

message RequiredContentStubLocality {
  string locality = 1;
  string workspace_id = 2;
  string stub_id = 3;
  int64 last_seen_unix_ms = 4;
}

message ReportRequiredContentRequest {
  string locality = 1;
  string workspace_id = 2;
  string stub_id = 3;
  repeated RequiredContentItem items = 4;
  int64 ttl_ms = 5;
}

message ReportRequiredContentResponse {
  bool ok = 1;
  string error_msg = 2;
}

message ListRecentRequiredContentStubsRequest {
  string locality = 1;
  int64 since_unix_ms = 2;
  int32 limit = 3;
}

message ListRecentRequiredContentStubsResponse {
  bool ok = 1;
  repeated RequiredContentStubLocality stubs = 2;
  string error_msg = 3;
}

message ListRequiredContentForStubRequest {
  string locality = 1;
  string workspace_id = 2;
  string stub_id = 3;
  int32 limit = 4;
}

message ListRequiredContentForStubResponse {
  bool ok = 1;
  repeated RequiredContentItem items = 2;
  string error_msg = 3;
}

message SetRequiredContentReconciliationStatusRequest {
  string locality = 1;
  string workspace_id = 2;
  string stub_id = 3;
  string hash = 4;
  string routing_key = 5;
  string status = 6;
  string error_msg = 7;
  int64 ttl_ms = 8;
}

message SetRequiredContentReconciliationStatusResponse {
  bool ok = 1;
  string error_msg = 2;
}

message RequiredContentOrigin {
  string path = 1;
  string bucket_name = 2;
  string region = 3;
  string endpoint_url = 4;
  string access_key = 5;
  string secret_key = 6;
  string cache_path = 7;
  bool force_path_style = 8;
  string expected_hash = 9;
}

message ResolveRequiredContentOriginRequest { RequiredContentItem item = 1; }

message ResolveRequiredContentOriginResponse {
  bool ok = 1;
  bool origin_available = 2;
  RequiredContentOrigin origin = 3;
  string error_msg = 4;
}

message SetCacheClientLockRequest {
  string hash = 1;
  string host_id = 2;
}

message SetCacheClientLockResponse {
  bool ok = 1;
  string error_msg = 2;
}

message RemoveCacheClientLockRequest {
  string hash = 1;
  string host_id = 2;
}

message RemoveCacheClientLockResponse {
  bool ok = 1;
  string error_msg = 2;
}

message SetCacheStoreFromContentLockRequest {
  string locality = 1;
  string source_path = 2;
}

message SetCacheStoreFromContentLockResponse {
  bool ok = 1;
  string error_msg = 2;
}

message RemoveCacheStoreFromContentLockRequest {
  string locality = 1;
  string source_path = 2;
}

message RemoveCacheStoreFromContentLockResponse {
  bool ok = 1;
  string error_msg = 2;
}

message RefreshCacheStoreFromContentLockRequest {
  string locality = 1;
  string source_path = 2;
}

message RefreshCacheStoreFromContentLockResponse {
  bool ok = 1;
  string error_msg = 2;
}

message WorkerCacheFSMetadata {
  string pid = 1;
  string id = 2;
  string name = 3;
  string path = 4;
  string hash = 5;
  uint64 ino = 6;
  uint64 size = 7;
  uint64 blocks = 8;
  uint64 atime = 9;
  uint64 mtime = 10;
  uint64 ctime = 11;
  uint32 atimensec = 12;
  uint32 mtimensec = 13;
  uint32 ctimensec = 14;
  uint32 mode = 15;
  uint32 nlink = 16;
  uint32 rdev = 17;
  uint32 blksize = 18;
  uint32 padding = 19;
  uint32 uid = 20;
  uint32 gid = 21;
  uint64 gen = 22;
}

message SetCacheFsNodeRequest {
  string id = 1;
  WorkerCacheFSMetadata metadata = 2;
}

message SetCacheFsNodeResponse {
  bool ok = 1;
  string error_msg = 2;
}

message GetCacheFsNodeRequest { string id = 1; }

message GetCacheFsNodeResponse {
  bool ok = 1;
  WorkerCacheFSMetadata metadata = 2;
  string error_msg = 3;
}

message AddCacheFsNodeChildRequest {
  string pid = 1;
  string id = 2;
}

message AddCacheFsNodeChildResponse {
  bool ok = 1;
  string error_msg = 2;
}

message RemoveCacheFsNodeRequest { string id = 1; }

message RemoveCacheFsNodeResponse {
  bool ok = 1;
  string error_msg = 2;
}

message RemoveCacheFsNodeChildRequest {
  string pid = 1;
  string id = 2;
}

message RemoveCacheFsNodeChildResponse {
  bool ok = 1;
  string error_msg = 2;
}

message GetCacheFsNodeChildrenRequest { string id = 1; }

message GetCacheFsNodeChildrenResponse {
  bool ok = 1;
  repeated WorkerCacheFSMetadata children = 2;
  string error_msg = 3;
}

message SetNetworkLockRequest {
  string network_prefix = 1;
  int32 ttl = 2;
  int32 retries = 3;
}

message SetNetworkLockResponse {
  bool ok = 1;
  string token = 2;
  string error_msg = 3;
}

message RemoveNetworkLockRequest {
  string network_prefix = 1;
  string token = 2;
}

message RemoveNetworkLockResponse {
  bool ok = 1;
  string error_msg = 2;
}

message SetContainerIpRequest {
  string network_prefix = 1;
  string container_id = 2;
  string ip_address = 3;
}

message SetContainerIpResponse {
  bool ok = 1;
  string error_msg = 2;
}

message MoveContainerIpRequest {
  string network_prefix = 1;
  string from_container_id = 2;
  string to_container_id = 3;
  string ip_address = 4;
}

message MoveContainerIpResponse {
  bool ok = 1;
  string error_msg = 2;
}

message GetContainerIpRequest {
  string network_prefix = 1;
  string container_id = 2;
}

message GetContainerIpResponse {
  bool ok = 1;
  string ip_address = 2;
  string error_msg = 3;
}

message GetContainerIpsRequest { string network_prefix = 1; }

message GetContainerIpsResponse {
  bool ok = 1;
  repeated string ips = 2;
  string error_msg = 3;
}

message ContainerIpAssignment {
  string container_id = 1;
  string ip_address = 2;
}

message GetContainerIpAssignmentsRequest { string network_prefix = 1; }

message GetContainerIpAssignmentsResponse {
  bool ok = 1;
  repeated ContainerIpAssignment assignments = 2;
  string error_msg = 3;
}

message RemoveContainerIpRequest {
  string network_prefix = 1;
  string container_id = 2;
}

message RemoveContainerIpResponse {
  bool ok = 1;
  string error_msg = 2;
}
