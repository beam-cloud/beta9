AWSTemplateFormatVersion: "2010-09-09"
Description: Beam AWS BYOC CPU pool. Creates an EC2 Auto Scaling Group that joins a Beam private pool.

Parameters:
  TargetAWSAccountID:
    Type: String
    AllowedPattern: '^\d{12}$'
    Description: AWS account ID entered in Beam. The stack validates this before creating resources.
  BeamGatewayURL:
    Type: String
    Description: Public Beam gateway HTTP URL.
  BeamJoinToken:
    Type: String
    NoEcho: true
    Description: Beam private pool join token.
  BeamPoolName:
    Type: String
    Description: Beam pool name used for AWS resource tags.
  BeamAutoScalingGroupName:
    Type: String
    AllowedPattern: '^[A-Za-z0-9._/-]{1,255}$'
    Description: Deterministic name for the EC2 Auto Scaling Group backing this Beam pool.
  BeamControlRolePrincipalArn:
    Type: String
    Default: ""
    AllowedPattern: '^$|^arn:[^:]+:iam::[0-9]{12}:(role/.+|root)$'
    Description: Optional Beam AWS principal allowed to resize this pool from Beam.
  BeamControlRoleName:
    Type: String
    Default: ""
    AllowedPattern: '^$|^[A-Za-z0-9+=,.@_-]{1,64}$'
    Description: Optional IAM role name for Beam to assume when resizing this pool.
  BeamControlExternalId:
    Type: String
    Default: ""
    NoEcho: true
    AllowedPattern: '^$|^[A-Za-z0-9+=,.@:_/-]{16,256}$'
    Description: External ID required when Beam assumes the optional control role.
  BeamWorkerImage:
    Type: String
    Default: public.ecr.aws/n4e0e1y0/beta9-worker:latest
    AllowedPattern: '^[A-Za-z0-9./:_@-]+$'
    Description: Beam worker image to run on each BYOC node.
  NodeInstanceType:
    Type: String
    Default: i4i.xlarge
    AllowedValues:
      - i4i.large
      - i4i.xlarge
      - i4i.2xlarge
      - i4i.4xlarge
    Description: EC2 storage-optimized instance type for Beam CPU nodes with local NVMe.
  RootVolumeSizeGB:
    Type: Number
    Default: 200
    MinValue: 50
    MaxValue: 2048
    Description: Root EBS volume size in GiB for image cache, logs, and sandbox working data.
  NetworkSlots:
    Type: Number
    Default: 128
    MinValue: 16
    MaxValue: 512
    Description: Preallocated container network slots per node.
  ContainerStartConcurrency:
    Type: Number
    Default: 16
    MinValue: 1
    MaxValue: 128
    Description: Maximum concurrent sandbox starts per node.
  DesiredCapacity:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 100
  MinSize:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 100
  MaxSize:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 100
  VpcCidr:
    Type: String
    Default: 10.86.0.0/16
  PublicSubnetACidr:
    Type: String
    Default: 10.86.1.0/24
  PublicSubnetBCidr:
    Type: String
    Default: 10.86.2.0/24
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id

Rules:
  TargetAccountMustMatch:
    Assertions:
      - Assert: !Equals [!Ref TargetAWSAccountID, !Ref "AWS::AccountId"]
        AssertDescription: This stack must be created in the AWS account ID entered in Beam.

Conditions:
  CreateBeamControlRole: !Not [!Equals [!Ref BeamControlRolePrincipalArn, ""]]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub beam-${BeamPoolName}
        - Key: beam:pool
          Value: !Ref BeamPoolName

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub beam-${BeamPoolName}

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub beam-${BeamPoolName}-public

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetACidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub beam-${BeamPoolName}-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnetBCidr
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub beam-${BeamPoolName}-b

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  NodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Beam BYOC node security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: udp
          FromPort: 41641
          ToPort: 41641
          CidrIp: 0.0.0.0/0
          Description: Tailscale direct WireGuard traffic
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub beam-${BeamPoolName}-nodes

  NodeSecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecurityGroup
      IpProtocol: -1
      SourceSecurityGroupId: !Ref NodeSecurityGroup
      Description: Beam BYOC node-to-node private traffic

  NodeSecurityGroupVpcIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecurityGroup
      IpProtocol: -1
      CidrIp: !Ref VpcCidr
      Description: Beam BYOC private VPC traffic

  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: beam:pool
          Value: !Ref BeamPoolName

  NodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref NodeRole

  BeamControlRole:
    Type: AWS::IAM::Role
    Condition: CreateBeamControlRole
    Properties:
      RoleName: !Ref BeamControlRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref BeamControlRolePrincipalArn
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref BeamControlExternalId
      Policies:
        - PolicyName: beam-byoc-scale
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - autoscaling:SetDesiredCapacity
                  - autoscaling:TerminateInstanceInAutoScalingGroup
                  - autoscaling:UpdateAutoScalingGroup
                Resource: !Sub arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/${BeamAutoScalingGroupName}
              - Effect: Allow
                Action:
                  - autoscaling:DescribeAutoScalingGroups
                  - cloudformation:DescribeStacks
                  - ec2:DescribeInstances
                Resource: "*"
      Tags:
        - Key: beam:pool
          Value: !Ref BeamPoolName

  NodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref NodeInstanceType
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: !Ref RootVolumeSizeGB
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
        IamInstanceProfile:
          Arn: !GetAtt NodeInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref NodeSecurityGroup
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub beam-${BeamPoolName}-node
              - Key: beam:pool
                Value: !Ref BeamPoolName
          - ResourceType: volume
            Tags:
              - Key: beam:pool
                Value: !Ref BeamPoolName
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail
            BEAM_STATE_DIR=/var/lib/beam/agent
            BEAM_NVME_ROOT=/mnt/beam-nvme
            NVME_DEVICE=""
            for link in /dev/disk/by-id/nvme-Amazon_EC2_NVMe_Instance_Storage*; do
              if [ -e "$link" ]; then
                NVME_DEVICE="$(readlink -f "$link")"
                break
              fi
            done
            if [ -n "$NVME_DEVICE" ]; then
              if ! blkid "$NVME_DEVICE" >/dev/null 2>&1; then
                mkfs.ext4 -F "$NVME_DEVICE"
              fi
              mkdir -p "$BEAM_NVME_ROOT"
              if ! mountpoint -q "$BEAM_NVME_ROOT"; then
                mount "$NVME_DEVICE" "$BEAM_NVME_ROOT"
              fi
              NVME_UUID="$(blkid -s UUID -o value "$NVME_DEVICE")"
              if [ -n "$NVME_UUID" ] && ! grep -q "$NVME_UUID" /etc/fstab; then
                echo "UUID=$NVME_UUID $BEAM_NVME_ROOT ext4 defaults,nofail,noatime 0 2" >> /etc/fstab
              fi
              BEAM_STATE_DIR="$BEAM_NVME_ROOT/beam/agent"
              mkdir -p "$BEAM_NVME_ROOT/docker" "$BEAM_STATE_DIR"
              mkdir -p /etc/docker
              printf '{"data-root":"%s"}\n' "$BEAM_NVME_ROOT/docker" > /etc/docker/daemon.json
            fi
            mkdir -p "$BEAM_STATE_DIR"
            IMDS_TOKEN="$(curl -fsS -X PUT -H 'X-aws-ec2-metadata-token-ttl-seconds: 21600' http://169.254.169.254/latest/api/token || true)"
            INSTANCE_ID=""
            if [ -n "$IMDS_TOKEN" ]; then
              INSTANCE_ID="$(curl -fsS -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id || true)"
            else
              INSTANCE_ID="$(curl -fsS http://169.254.169.254/latest/meta-data/instance-id || true)"
            fi
            if [ -n "$INSTANCE_ID" ]; then
              export BEAM_AGENT_MACHINE_FINGERPRINT="$INSTANCE_ID"
              export BEAM_AGENT_HOSTNAME="$INSTANCE_ID"
            fi
            export BEAM_AGENT_INSTALL_DOCKER=1
            curl -fsSL '${BeamGatewayURL}/install/agent' | sh -s -- \
              --gateway '${BeamGatewayURL}' \
              --join-token '${BeamJoinToken}' \
              --background \
              --state-dir "$BEAM_STATE_DIR" \
              --transport tsnet_restricted \
              --executor worker-container \
              --worker-image '${BeamWorkerImage}' \
              --network-slots '${NetworkSlots}' \
              --container-start-concurrency '${ContainerStartConcurrency}'

  NodeAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Ref BeamAutoScalingGroupName
      MinSize: !Ref MinSize
      MaxSize: !Ref MaxSize
      DesiredCapacity: !Ref DesiredCapacity
      VPCZoneIdentifier:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      HealthCheckType: EC2
      LaunchTemplate:
        LaunchTemplateId: !Ref NodeLaunchTemplate
        Version: !GetAtt NodeLaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub beam-${BeamPoolName}
          PropagateAtLaunch: true
        - Key: beam:pool
          Value: !Ref BeamPoolName
          PropagateAtLaunch: true

Outputs:
  PoolName:
    Description: Beam private pool name.
    Value: !Ref BeamPoolName
  AutoScalingGroupName:
    Description: EC2 Auto Scaling Group backing the Beam pool.
    Value: !Ref NodeAutoScalingGroup
  BeamControlRoleArn:
    Condition: CreateBeamControlRole
    Description: IAM role Beam can assume to resize the pool.
    Value: !GetAtt BeamControlRole.Arn
  VpcId:
    Description: VPC created for Beam BYOC nodes.
    Value: !Ref VPC
